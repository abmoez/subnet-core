services:
  postgres:
    image: postgres:16-alpine
    container_name: subnet-core-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: subnet_core
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: subnet-core-backend
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: subnet_core
      JWT_SECRET: bXlTdXBlclNlY3JldEtleUZvckp3dFRva2VuU2lnbmluZ1RoYXRJc0xvbmdFbm91Z2g
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      PORT: 3000
      NODE_ENV: production
      FRONTEND_URL: http://localhost
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile.seed
    container_name: subnet-core-seed
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: subnet_core
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - app-network

  pgweb:
    image: sosedoff/pgweb
    container_name: subnet-core-pgweb
    environment:
      PGWEB_DATABASE_URL: postgres://postgres:postgres@postgres:5432/subnet_core?sslmode=disable
    ports:
      - '8081:8081'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: subnet-core-frontend
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
